services:
  dnsmasq:
    container_name: dnsmasq
    image: alpine:3.21
    entrypoint: /entrypoint.sh
    environment:
      CADDY_SITES: ${CADDY_SITES:-php83,php84}
      SITE_TLD: ${SITE_TLD:-symf4}
      CERT_EXTRA_SANS: ${CERT_EXTRA_SANS:-}
      CADDY_IP: 172.19.0.3
    volumes:
      - ./dnsmasq-entrypoint.sh:/entrypoint.sh:ro
    networks:
      default:
        ipv4_address: 172.19.0.2
    restart: unless-stopped

  caddy:
    container_name: caddy
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      WEB_ROOT: ${WEB_ROOT}
      CADDY_SITES: ${CADDY_SITES:-php83,php84}
      SITE_TLD: ${SITE_TLD:-symf4}
      CERT_EXTRA_SANS: ${CERT_EXTRA_SANS:-}
    volumes:
      - ./caddy-entrypoint.sh:/entrypoint.sh:ro
      - ./certs:/etc/caddy/certs
      - ./overrides:/etc/caddy/overrides:ro
      - web:${WEB_ROOT}:ro
    entrypoint: /entrypoint.sh
    depends_on:
      - php83
      - php84
    networks:
      default:
        ipv4_address: 172.19.0.3
    restart: unless-stopped

  php83:
    container_name: php83
    build:
      context: .
      dockerfile: Dockerfile.php
      args:
        PHP_VERSION: "8.3"
        WEB_ROOT: ${WEB_ROOT}
        HOST_UID: ${HOST_UID}
        SQLCIPHER_VERSION: ${PHP83_SQLCIPHER_VERSION:-}
        CHROME_VERSION: ${PHP83_CHROME_VERSION:-128.0.6613.137}
        INSTALL_XDEBUG: ${PHP83_XDEBUG:-}
        INSTALL_FFMPEG: ${PHP83_FFMPEG:-}
        INSTALL_ANDROID_SDK: ${PHP83_ANDROID_SDK:-}
        NODE_VERSIONS: ${PHP83_NODE_VERSIONS:-}
        HOST_HOME: ${HOME}
    hostname: PHP83
    user: "${HOST_UID}:${HOST_UID}"
    shm_size: '2g'
    ports:
      - "8300-8309:8300-8309"
    tmpfs:
      - /tmp
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      PANTHER_NO_SANDBOX: 1
      HOME: ${HOME}
      CLAUDE_AUTO_UPDATE: 0
      TMPDIR: /tmp
    volumes:
      - web:${WEB_ROOT}
      - ./config/php.ini:/usr/local/etc/php/conf.d/zzz-custom.ini:ro
      - ./config/php83-overrides.ini:/usr/local/etc/php/conf.d/zzzz-overrides.ini:ro
      - ./config/php-fpm-pool.conf:/usr/local/etc/php-fpm.d/zzz-custom.conf:ro
      - ${HOME}/.ssh:${HOME}/.ssh:ro
      - ${HOME}/.gitconfig:${HOME}/.gitconfig:ro
      - ${HOME}/.local/bin/claude:${HOME}/.local/bin/claude:ro
      - ${HOME}/.claude:${HOME}/.claude
      - ${HOME}/.claude.json:${HOME}/.claude.json
    dns:
      - 172.19.0.2
    depends_on:
      - dnsmasq
    networks:
      default:
        ipv4_address: 172.19.0.4
    restart: unless-stopped

  php84:
    container_name: php84
    build:
      context: .
      dockerfile: Dockerfile.php
      args:
        PHP_VERSION: "8.4"
        WEB_ROOT: ${WEB_ROOT}
        HOST_UID: ${HOST_UID}
        SQLCIPHER_VERSION: ${PHP84_SQLCIPHER_VERSION:-}
        CHROME_VERSION: ${PHP84_CHROME_VERSION:-128.0.6613.137}
        INSTALL_XDEBUG: ${PHP84_XDEBUG:-}
        INSTALL_FFMPEG: ${PHP84_FFMPEG:-}
        INSTALL_ANDROID_SDK: ${PHP84_ANDROID_SDK:-}
        NODE_VERSIONS: ${PHP84_NODE_VERSIONS:-}
        HOST_HOME: ${HOME}
    hostname: PHP84
    user: "${HOST_UID}:${HOST_UID}"
    shm_size: '2g'
    ports:
      - "8400-8409:8400-8409"
    tmpfs:
      - /tmp
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      PANTHER_NO_SANDBOX: 1
      HOME: ${HOME}
      CLAUDE_AUTO_UPDATE: 0
      TMPDIR: /tmp
    volumes:
      - web:${WEB_ROOT}
      - ./config/php.ini:/usr/local/etc/php/conf.d/zzz-custom.ini:ro
      - ./config/php84-overrides.ini:/usr/local/etc/php/conf.d/zzzz-overrides.ini:ro
      - ./config/php-fpm-pool.conf:/usr/local/etc/php-fpm.d/zzz-custom.conf:ro
      - ${HOME}/.ssh:${HOME}/.ssh:ro
      - ${HOME}/.gitconfig:${HOME}/.gitconfig:ro
      - ${HOME}/.local/bin/claude:${HOME}/.local/bin/claude:ro
      - ${HOME}/.claude:${HOME}/.claude
      - ${HOME}/.claude.json:${HOME}/.claude.json
    dns:
      - 172.19.0.2
    depends_on:
      - dnsmasq
    networks:
      default:
        ipv4_address: 172.19.0.5
    restart: unless-stopped

  mysql:
    container_name: mysql
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./config/my.cnf:/etc/my.cnf:ro
      - ./data/dumps:/dumps
      - web:/web
    networks:
      default:
        ipv4_address: 172.19.0.6

  mysql84:
    container_name: mysql84
    image: mysql:8.4
    profiles: [mysql84]
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3384:3306"
    volumes:
      - ./data/mysql84:/var/lib/mysql
      - ./data/dumps:/dumps
      - web:/web

  mariadb:
    container_name: mariadb
    image: mariadb:11.1
    profiles: [mariadb]
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3406:3306"
    volumes:
      - ./data/mariadb:/var/lib/mysql
      - ./data/dumps:/dumps
      - web:/web

  # N.B. mkdir data/mssql && sudo chown 10001:0 data/mssql
  mssql:
    container_name: mssql
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles: [mssql]
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - ./data/mssql:/var/opt/mssql

  postgres:
    container_name: postgres
    image: postgis/postgis
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql
      - web:/web
    networks:
      default:
        ipv4_address: 172.19.0.7

  samba:
    container_name: samba
    build:
      context: .
      dockerfile: Dockerfile.samba
    profiles: [samba]
    restart: unless-stopped
    environment:
      SAMBA_ROOT: ${SAMBA_ROOT:-}
      SAMBA_USER: ${SAMBA_USER:-}
      SAMBA_PASSWORD: ${SAMBA_PASSWORD:-}
      HOST_UID: ${HOST_UID}
    ports:
      - "445:445"
    volumes:
      - ${SAMBA_ROOT:-.}:/share
      - ./config/smb.conf:/etc/samba/smb.conf:ro

  cloud-sql-proxy:
    container_name: cloud-sql-proxy
    build:
      context: .
      dockerfile: Dockerfile.cloud-sql-proxy
    ports:
      - "${CLOUD_SQL_PORT:-3307}:${CLOUD_SQL_PORT:-3307}"
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /adc/application_default_credentials.json
    volumes:
      - web:${WEB_ROOT}:ro
      - ./cloud-sql.json:/etc/cloud-sql/config.json:ro
      - ./data/gcloud:/adc:ro
    networks:
      default:
        ipv4_address: 172.19.0.8
    restart: unless-stopped

volumes:
  web:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${WEB_ROOT}

networks:
  default:
    ipam:
      config:
        - subnet: 172.19.0.0/24
