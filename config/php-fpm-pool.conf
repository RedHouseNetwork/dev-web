[www]
; php_admin_value cannot be overridden by ini_set() or error_reporting() at runtime.
; This suppresses deprecation notices that would otherwise be output during
; cold-cache Symfony container compilation, polluting the response.
php_admin_value[error_reporting] = 24575
php_admin_flag[display_errors] = Off

; Pass the custom CA bundle so FPM workers trust the dev self-signed cert.
env[SSL_CERT_FILE] = /tmp/ca-bundle.crt
